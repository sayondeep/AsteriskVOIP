; ---------- Transport (was [general]) ----------
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
local_net=192.168.0.0/24

; ---------- Extension 7001 ----------
[7001]
type=endpoint
context=internal
disallow=all
allow=ulaw
auth=7001
aors=7001
transport=transport-udp
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
timers=no

[7001]
type=auth
auth_type=userpass
username=7001
password=7001

[7001]
type=aor
max_contacts=1

